name: Generate Resume PDF

on:
  push:
    branches:
      - main
    paths:
      - "resume/resume.md"

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate PDF
        run: node build-scripts/generate-pdf.js

      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/resume.pdf
          git commit -m "auto: update resume PDF" || echo "No changes"
          git push