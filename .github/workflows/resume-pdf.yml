name: Generate Resume PDF

on:
  push:
    branches:
      - main
    paths:
      - "resume/resume.md"
      - "resume/resume-professional.md"
      - "build-scripts/generate-resume-pdf.js"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate PDFs
        run: node build-scripts/generate-resume-pdf.js

      - name: Commit PDFs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/resume.pdf public/resume-detailed.pdf public/resume-professional.pdf
          git commit -m "auto: update resume PDFs" || echo "No changes"
          git push